# Site settings
title: "AI Tools Daily"
description: "Your daily source for AI productivity tools, automation strategies, and passive income ideas"
baseurl: ""
url: "https://yourusername.github.io"
author: "AI Tools Daily Team"
email: "contact@aitoolsdaily.com"

# Build settings
markdown: kramdown
permalink: /:title/
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
keywords: "AI tools, productivity automation, passive income, ChatGPT alternatives, automation tools"

# Monetization (these just need your ID)  
affiliate_amazon: "YOUR-AMAZON-ID"
amazon_ad_script: |}
  <script type="text/javascript">
    amzn_assoc_placement = "adunit0";
    amzn_assoc_tracking_id = "YOUR-AMAZON-ID";
    amzn_assoc_ad_mode = "search";
    amzn_assoc_ad_type = "smart";
    amzn_assoc_marketplace = "amazon";
    amzn_assoc_region = "US";
    amzn_assoc_title = "Shop Related Products";
    amzn_assoc_default_search_phrase = "AI productivity tools";
    amzn_assoc_default_category = "All";
  </script>

# Google Adsense (add your ID when ready)
google_adsense: "YOUR-ADSENSE-ID"

# Social
instagram: aitoolsdaily
pinterest: aitoolsdaily

# Collections
posts_per_page: 10

# Theme
show_excerpts: true

# Analytics
google_analytics: "YOUR-GA-ID"